quarkus.application.name=user-service
quarkus.http.port=8081

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=user_svc
quarkus.datasource.password=user_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/user_db

quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

mp.jwt.verify.issuer=https://marketflow.com
mp.jwt.verify.publickey.location=META-INF/publicKey.pem
smallrye.jwt.sign.key.location=META-INF/privateKey.pem

marketflow.jwt.access-token.expiration=3600
marketflow.jwt.refresh-token.expiration=604800

quarkus.smallrye-health.root-path=/health

quarkus.log.level=INFO
quarkus.log.category."com.marketflow".level=DEBUG