quarkus.application.name=product-service
quarkus.http.port=8082
quarkus.devservices.enabled=false

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=product_svc
quarkus.datasource.password=product_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5434/product_db

quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

mp.jwt.verify.issuer=https://marketflow.com
mp.jwt.verify.publickey.location=META-INF/publicKey.pem

quarkus.smallrye-health.root-path=/health

quarkus.log.level=INFO
quarkus.log.category."com.marketflow".level=DEBUG